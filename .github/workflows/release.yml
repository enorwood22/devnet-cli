name: Release CLI

# Trigger: git tag v0.2.0 && git push --tags
on:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Bundle
        run: npm run bundle

      - name: Package all platforms
        run: |
          mkdir -p bin
          npx pkg dist/bundle.cjs --target node18-win-x64     --output bin/devnet-win.exe
          npx pkg dist/bundle.cjs --target node18-macos-x64   --output bin/devnet-macos-x64
          npx pkg dist/bundle.cjs --target node18-macos-arm64 --output bin/devnet-macos-arm64
          npx pkg dist/bundle.cjs --target node18-linux-x64   --output bin/devnet-linux-x64
          npx pkg dist/bundle.cjs --target node18-linux-arm64 --output bin/devnet-linux-arm64

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            bin/devnet-win.exe
            bin/devnet-macos-x64
            bin/devnet-macos-arm64
            bin/devnet-linux-x64
            bin/devnet-linux-arm64
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
