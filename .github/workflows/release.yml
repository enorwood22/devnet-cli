name: Release CLI

# Wakes up when release.sh pushes a version tag (e.g. v0.2.0)
on:
  push:
    tags:
      - "v*"

jobs:
  release:
    name: Build & publish
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to create the GitHub Release

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Write the version from package.json into src/version.ts
      # so the binary prints the correct version when you run `devnet --version`
      - name: Stamp version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "export const CLI_VERSION = \"$VERSION\";" > src/version.ts

      - name: Bundle (esbuild → dist/bundle.js)
        run: npm run bundle

      # Build self-contained binaries for every platform.
      # Each binary includes the Node.js runtime — users don't need Node installed.
      - name: Package binaries
        run: |
          mkdir -p bin
          npx @yao-pkg/pkg . --target node18-win-x64     --output bin/devnet-win.exe
          npx @yao-pkg/pkg . --target node18-macos-x64   --output bin/devnet-macos-x64
          npx @yao-pkg/pkg . --target node18-macos-arm64 --output bin/devnet-macos-arm64
          npx @yao-pkg/pkg . --target node18-linux-x64   --output bin/devnet-linux-x64
          npx @yao-pkg/pkg . --target node18-linux-arm64 --output bin/devnet-linux-arm64

      # Create the GitHub Release and attach all five binaries.
      # GITHUB_TOKEN is provided automatically — no secrets setup required.
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            bin/devnet-win.exe
            bin/devnet-macos-x64
            bin/devnet-macos-arm64
            bin/devnet-linux-x64
            bin/devnet-linux-arm64
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
