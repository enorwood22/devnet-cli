name: Release CLI

# Trigger: git tag v0.2.0 && git push --tags
on:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "18"
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Stamp version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "export const CLI_VERSION = \"$VERSION\";" > src/version.ts

      - name: Bundle
        run: npm run bundle

      - name: Package all platforms
        run: |
          mkdir -p bin
          npx @yao-pkg/pkg dist/bundle.cjs --target node18-win-x64     --output bin/devnet-win.exe
          npx @yao-pkg/pkg dist/bundle.cjs --target node18-macos-x64   --output bin/devnet-macos-x64
          npx @yao-pkg/pkg dist/bundle.cjs --target node18-macos-arm64 --output bin/devnet-macos-arm64
          npx @yao-pkg/pkg dist/bundle.cjs --target node18-linux-x64   --output bin/devnet-linux-x64
          npx @yao-pkg/pkg dist/bundle.cjs --target node18-linux-arm64 --output bin/devnet-linux-arm64

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          files: |
            bin/devnet-win.exe
            bin/devnet-macos-x64
            bin/devnet-macos-arm64
            bin/devnet-linux-x64
            bin/devnet-linux-arm64
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
